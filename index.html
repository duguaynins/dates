<!DOCTYPE html>
<html lang="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nins / date.sys</title>

  

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#FFFFFF">
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#111827;
}

canvas{
    display:block;
    width:100vw;
    height:100vh;
}

/* 全螢幕轉場 */
#flash{
    position:fixed;
    inset:0;
    background:transparent;
    z-index:9999;
    pointer-events:none;

    display:flex;
    justify-content:center;
    align-items:center;

    transition:
        background-color 0.75s ease,
        opacity 0.75s ease;
}

#secret{
    font-family:monospace;
    font-size:clamp(18px,2vw,28px);
    letter-spacing:2px;

    color:#000;
    opacity:0;

    transition:
        color 1s ease,
        opacity 1s ease,
        transform 1s ease;

    transform:translateY(10px);
    text-align: center;
}
</style>
</head>

<body>

<canvas id="colors"></canvas>

<div id="flash">
    <a id="secret"></a>
    <p id="clipboard" style="display: none;"></p>
</div>

<script>
const canvas = document.getElementById("colors");
const ctx = canvas.getContext("2d");

let w, h, dpr;

// 頁面載入即開始 GPS 定位
let gpsPromise = new Promise((resolve, reject) => {
    navigator.geolocation.getCurrentPosition(resolve, reject, {
        enableHighAccuracy: true,
        timeout: 90909,
        maximumAge: 0
    });
});

function resize(){
    dpr = window.devicePixelRatio || 1;
    w = window.innerWidth;
    h = window.innerHeight;

    canvas.width = w * dpr;
    canvas.height = h * dpr;

    canvas.style.width = w + "px";
    canvas.style.height = h + "px";

    ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
window.addEventListener("resize", resize);

function hsla(h,a){
    return `hsla(${h},85%,60%,${a})`;
}

function draw(t){

    const time = t * 0.001;

    ctx.globalCompositeOperation = "source-over";
    ctx.fillStyle = "rgba(17,24,39,0.18)";
    ctx.fillRect(0,0,w,h);

    ctx.globalCompositeOperation = "lighter";

    const breath = 0.6 + Math.sin(time * 0.8) * 0.25;
    const baseHue = time * 30;

    for(let i=0;i<12;i++){

        const angle = time * 0.4 + i * 0.6;

        const radius =
            (Math.min(w,h) * 0.22) *
            (1 + Math.sin(time*0.6 + i)*0.3);

        const x =
            w/2 + Math.cos(angle + i) * radius;

        const y =
            h/2 + Math.sin(angle * 1.3 + i) * radius;

        const hue = (baseHue + i*15) % 360;

        const size = Math.min(w,h) * 0.35;

        const g =
            ctx.createRadialGradient(
                x,y,0,
                x,y,size
            );

        g.addColorStop(0, hsla(hue,0.18 * breath));
        g.addColorStop(1,"transparent");

        ctx.fillStyle = g;
        ctx.fillRect(0,0,w,h);
    }

    requestAnimationFrame(draw);
}

requestAnimationFrame(draw);

/* -------------------------- */

function wait(ms){
    return new Promise(r => setTimeout(r, ms));
}

document.addEventListener(
    "click",
    async () => {

        let offset = -new Date().getTimezoneOffset();
        const hours = Math.trunc(offset / 60);
        const minutes = Math.abs(offset % 60);
        const sign = hours >= 0 ? "+" : "-";
        const tz =
    `${sign}` +
    `${String(Math.abs(hours)).padStart(2,"0")}:` +
    `${String(minutes).padStart(2,"0")}`;
        let utc = new Date().toISOString();
        let details = `${utc}${tz}`;///${utc}${offset}/60`;

        let dates = new Date().toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
        let year = dates.slice(0, 4);
        let ctz = Intl.DateTimeFormat().resolvedOptions().timeZone;

        const flash = document.getElementById("flash");
        const secret = document.getElementById("secret");

        /* 1. 全黑 */

        flash.style.backgroundColor = "#000";

        /* 2. 偷偷顯示黑字 */

        secret.textContent = details;
        secret.innerHTML = `${utc}<br>${ctz}<br>${tz}`;
        secret.style.color = "#000";
        secret.style.opacity = "1";
        ///secret.style.transform = "translateY(0)";

        await wait(1500/2);

        /* 3. 切成全白 */

        flash.style.backgroundColor = "#fff";

        await wait(1500/2);

        /* 4. 白底浮現文字 */

        secret.style.color = "#111";
        secret.style.opacity = "1";

        await wait(1500/5);

        /* 5. 建立 Calendar URL */


        ///const main = prompt("main");
        ///const desc = prompt("desc");

        let pos;
        try {
            pos = await gpsPromise;
        } catch (err) {
            console.error(err);
            alert(String(err.message));
            return;
        }

        let coords = `${pos.coords.latitude},${pos.coords.longitude}`;
        const location = `https://www.google.com/maps/search/?api=1&query=${coords}`;
        const description = `https://www.google.com/maps/search/?api=1&query=${coords}&nins=${details}`;

        const url = [
            "https://www.google.com/calendar/render?",
            "action=TEMPLATE",
            `&text=${year}-${ctz}`,
            `&dates=${dates}/${dates}`,
            `&ctz=${ctz}`,
            `&location=${encodeURIComponent(coords)}`,
            "&trp=true",
            "&recur=",
            "&add=",
            `&details=${encodeURIComponent(description)}`,
            "&source=",
            "&sprop="
        ].join("");
        ///navigator.clipboard.writeText(url);
        ///window.location.href = url;

        // 起訖時間（預設 1 小時）
        const now = new Date();
        const dtStart = now.toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
        const dtEnd = new Date(now.getTime() + 60 * 60 * 1000)
        .toISOString()
        .replace(/[-:]/g, "")
        .split(".")[0] + "Z";

        const ics =
        `
BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//NINS//Calendar//EN
CALSCALE:GREGORIAN
METHOD:PUBLISH
BEGIN:VEVENT
UID:${crypto.randomUUID()}
DTSTAMP:${dtStart}
DTSTART:${dtStart}
DTEND:${dtEnd}
SUMMARY:${year}-${ctz}
DESCRIPTION:${description}
LOCATION:${coords}
RRULE:FREQ=YEARLY
END:VEVENT
END:VCALENDAR`.trim();///RRULE:FREQ=YEARLY;BYMONTH=7;BYMONTHDAY=5

        const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });/*
        const link = document.createElement("a");

        link.href = URL.createObjectURL(blob);
        link.download = `nins-dates-${Date.now()}.ics`;

        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);*/

        
        document.getElementById("secret").href = URL.createObjectURL(blob);
        document.getElementById("secret").download = `nins-dates-${Date.now()}.ics`;
        document.getElementById("secret").textContent = `nins-dates-xxxxxx.ics`;
        document.getElementById("secret").style.pointerEvents = "auto";
        document.getElementById("colors").style.display = `none`;
        document.getElementById("clipboard").textContent = url;

    },
    { once:true }
);

document.getElementById("secret").addEventListener("click", async () => {
    await navigator.clipboard.writeText(document.getElementById("clipboard").textContent);
    alert("copied and downloaded");
});
</script>

</body>
</html>
